<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSK Bahasa Inggris 2026 - KKG Ngasem</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f8f9fc;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        
        .quiz-container { 
            max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            position: relative;
        }

        .logo-header { 
            display: block; 
            margin: 0 auto 15px; 
            max-width: 90px; 
            height: auto; 
        }

        /* UKURAN GAMBAR DIPERKECIL SESUAI PERMINTAAN */
        .question-image { 
            display: block; 
            max-width: 220px; /* Ukuran diperkecil */
            height: auto; 
            margin: 15px auto; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #timer-wrapper { 
            background: var(--primary); 
            color: white; 
            padding: 8px 15px; 
            border-radius: 20px; 
            text-align: center; 
            font-size: 1.1rem; 
            font-weight: bold; 
            display: inline-block;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .passage { 
            background: #f9f9f9; 
            padding: 15px; 
            border-left: 5px solid var(--accent); 
            margin-bottom: 20px; 
            line-height: 1.6;
            font-style: italic;
            font-size: 0.95rem;
        }

        .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 20px; color: var(--primary); line-height: 1.4; }

        .option { 
            display: block; 
            width: 100%; 
            text-align: left; 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            background: white; 
            cursor: pointer; 
            transition: 0.2s;
            font-size: 1rem;
        }

        .option:hover { background: #f0f7ff; border-color: var(--accent); }
        .option.selected { background: var(--accent); color: white; border-color: var(--accent); }

        .btn-group { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; flex: 1; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #95a5a6; color: white; max-width: 120px; }

        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); 
            gap: 6px; 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid #eee;
        }

        .nav-num { 
            height: 35px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 0.8rem;
            background: white;
        }

        .nav-num.answered { background: var(--success); color: white; border-color: var(--success); }
        .nav-num.current { border: 2px solid var(--primary); font-weight: bold; transform: scale(1.1); }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 2px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box;
            font-size: 1rem;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .quiz-container { padding: 20px; }
            #timer-wrapper { position: static; display: block; margin-bottom: 15px; }
            .question-image { max-width: 160px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="login-screen">
        <img src="https://awsimages.detik.net.id/community/media/visual/2023/05/02/lambang-tut-wuri-handayani.png?w=700&q=90" class="logo-header" alt="Logo">
        <h2 style="text-align:center; color: var(--primary); margin: 0;">SELEKSI OSK BAHASA INGGRIS 2026</h2>
        <h4 style="text-align:center; color: var(--secondary); margin: 5px 0 20px 0;">KKG KELAS KECAMATAN NGASEM</h4>
        <hr>
        <p style="text-align:center;">Waktu: <b>20 Menit</b> | Total: <b>40 Soal</b></p>
        <input type="text" id="username" placeholder="Masukkan Nama Lengkap Anda...">
        <button class="btn btn-primary" style="width:100%" onclick="startQuiz()">Mulai Ujian</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer-wrapper">Sisa Waktu: <span id="timer-display">20:00</span></div>
        <div id="progress" style="margin-bottom:15px; font-weight:bold; color: var(--accent);"></div>
        
        <div id="passage-box" class="passage hidden"></div>
        <img id="image-box" class="question-image hidden" src="">
        <div id="question-box" class="question-text"></div>
        <div id="options-box"></div>
        
        <div class="btn-group">
            <button id="prev-btn" class="btn btn-secondary" onclick="prevQuestion()">Kembali</button>
            <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()">Lanjut</button>
        </div>
        <div class="nav-grid" id="nav-grid"></div>
    </div>

    <div id="result-screen" class="hidden" style="text-align:center">
        <img src="https://awsimages.detik.net.id/community/media/visual/2023/05/02/lambang-tut-wuri-handayani.png?w=700&q=90" class="logo-header" alt="Logo">
        <h2>Ujian Selesai!</h2>
        <p>Skor Akhir Anda:</p>
        <h1 id="final-score" style="font-size: 5rem; color: var(--success); margin: 10px 0;">0</h1>
        <p id="status-upload"></p>
        <button class="btn btn-primary" style="max-width: 200px;" onclick="location.reload()">Keluar</button>
    </div>
</div>

<script>
    const DATABASE_URL = "https://script.google.com/macros/s/AKfycbwKO1xOJIPSCASJU1oab0Vj4pZc4Lf6FTl03ryO9bYhC57xDzQ5WtUSNaISmrz7VPJELA/exec";

    const quizData = [
        { q: "“I see sunset in the evening.” <br> Please translate the sentence in Indonesia", options: {a: "Aku melihat matahari bersinar", b: "Aku sarapan setiap sore", c: "Aku melihat matahari terbenam", d: "Aku tidur pada sore hari"}, ans: "c" },
        { passage: "<b>Budi</b> is a friendly boy who loves to play soccer. He has short black hair and a bright smile. He also has a pointed nose. He likes to help his mother cook and clean the house. In his free time, Budi enjoys reading books and playing video games.", q: "What does Budi like to do in his free time?", options: {a: "Read books and play video games", b: "Goes jogging", c: "Help his mother cook", d: "Clean the house"}, ans: "a" },
        { q: "Teacher : . . . . the whiteboard please !<br> Student : Ok sir", options: {a: "sleep", b: "clean", c: "sweep", d: "write"}, ans: "b" },
        { q: "What is the tittle of text above?", image: "https://cdn1-production-images-kly.akamaized.net/13Cofsh9EEaCAw3BMcsCWuQ2sSw=/2560x1440/smart/filters:quality(75):strip_icc()/kly-media-production/medias/891122/original/017165200_1433240128-borobudur-top.gif", options: {a: "Borobudur Temple", b: "Tourist", c: "Central Java", d: "Beautifull Scenery"}, ans: "a" },
        { q: "The dog and the cat .... playing together in the yard.", options: {a: "were", b: "was", c: "is", d: "are"}, ans: "d" },
        { q: "He walk using his ….", options: {a: "hand", b: "stomach", c: "neck", d: "feet"}, ans: "d" },
        { q: "Anisa chews the food using her ….", options: {a: "eyes", b: "tongue", c: "teeth", d: "finger"}, ans: "c" },
        { q: "My brother will … a car tomorrow.", image: "https://media.quizizz.com/_mdserver/main/media/resource/gs/quizizz-media/quizzes/ab37c7a1-982b-42cc-bbc1-40036f38123e-v2", options: {a: "read", b: "write", c: "paint", d: "see"}, ans: "c" },
        { q: "My father will … to Jakarta tomorrow night.", options: {a: "goes", b: "going", c: "go", d: "is going"}, ans: "c" },
        { q: "Andy: Sir, my leg is hurt. … I go home now? <br>Teacher: Oh. Yes, of course!", options: {a: "Shall", b: "May", c: "Must", d: "will"}, ans: "b" },
        { q: "A …. works in the hospital", options: {a: "Doctor", b: "Gardener", c: "Bricklayer", d: "Headmaster"}, ans: "a" },
        { q: "Today is Friday. <br> Tomorrow is …", options: {a: "Friday", b: "Saturday", c: "Sunday", d: "Monday"}, ans: "b" },
        { q: "It’s like a tiger, but it is small. <br> It is a …", options: {a: "Elephant", b: "Cat", c: "Parrot", d: "Rabbit"}, ans: "b" },
        { q: "Arrange: Reog – is – dance – East – Ponorogo – a – traditional – from – Java", options: {a: "Ponorogo is a dance reog traditional from Java East", b: "East Java is a traditional dance from Reog Ponorogo", c: "Reog Ponorogo is a traditional dance from East Java", d: "Reog is a dance traditional Ponorogo from East Java"}, ans: "c" },
        { q: "Ani is sleeping in the bedroom with her ....", options: {a: "pillow, bolster, and door mat", b: "refrigerator, pillow, and blanket", c: "pillow, doll, and blanket", d: "bolster, blanket, and ashtray"}, ans: "c" },
        { q: "Shopper : '... is a kilo of these apples?' <br> Seller : 'Ten-thousand rupiahs, Madam.'", options: {a: "How many", b: "What", c: "How much", d: "How"}, ans: "c" },
        { q: "“He is very handsome.” <br> “Handsome” is similar in meaning to ....", options: {a: "Sweet", b: "Ugly", c: "Diligent", d: "Good-looking"}, ans: "d" },
        { q: "The canteen is beside the classroom. <br> 'beside' means ….", options: {a: "di depan", b: "di antara", c: "di samping", d: "di belakang"}, ans: "c" },
        { q: "Mr Rozi …. in the classroom", options: {a: "reading", b: "teaches", c: "buy snack", d: "praying"}, ans: "b" },
        { q: "“The deer is shorter than the giraffe” <br> In Indonesia is …", options: {a: "Rusa lebih pendek dari jerapah", b: "Rusa lebih kencang dari jerapah", c: "Lebah lebih kecil dari jerapah", d: "Jerapah lebih tinggi dari rusa"}, ans: "a" },
        { q: "An elephant is …. than a rabbit.", options: {a: "More", b: "Bigger", c: "Small", d: "Long"}, ans: "b" },
        { q: "Mita: Can you accompany to bookstrore? <br> Vina: … I have a terrible headache.", options: {a: "I am sorry", b: "No, thanks", c: "Yes, I am", d: "Of course"}, ans: "a" },
        { passage: "Faza and her mother were in the kitchen cooking. Her father was reading a book, while Eko was fishing.", q: "What is being done by Faza's father?", options: {a: "Cooking", b: "Fishing", c: "Reading", d: "Painting"}, ans: "c" },
        { q: "Which statement is true about body parts?", options: {a: "We use mouth to talk", b: "We use legs to listen", c: "We use hands to pick apple", d: "We use legs to carry bag"}, ans: "a" },
        { q: "Rina 150cm, Shella 165cm, Anisa 170cm. <br> Shella is ... than Rina.", options: {a: "shorter", b: "taller", c: "tallest", d: "short"}, ans: "b" },
        { q: "The animal that likes to barking is …", options: {a: "Sheep", b: "Fish", c: "Dog", d: "Duck"}, ans: "c" },
        { q: "Apple, banana and orange are kinds of…", options: {a: "Fruits", b: "Candies", c: "Animals", d: "Vegetables"}, ans: "a" },
        { q: "You can find the sign 'Don’t walk on the grass!' in the …", options: {a: "Beach", b: "Park", c: "Street", d: "Toilet"}, ans: "b" },
        { q: "Which animal is taller?", options: {a: "Elephant", b: "Giraffe", c: "Lion", d: "Horse"}, ans: "b" },
        { q: "What is the function of our ears?", options: {a: "To see things", b: "To smell food", c: "To hear sounds", d: "To hold objects"}, ans: "c" },
        { q: "The elephant is ... than the horse.", options: {a: "big", b: "bigger", c: "biggest", d: "more big"}, ans: "b" },
        { q: "What is the color of the sky?", options: {a: "Red", b: "Blue", c: "Green", d: "Yellow"}, ans: "b" },
        { q: "Arrange: my – will - bike – I – ride – Sudirman Street – to.", options: {a: "I will my bike ride to Sudirman Street", b: "To Sudirman Street I will ride my bike", c: "I will ride my bike to Sudirman Street", d: "My bike to Sudirman Street I will ride"}, ans: "c" },
        { q: "I ... the floor every morning.", options: {a: "listen", b: "sweep", c: "cook", d: "write"}, ans: "b" },
        { q: "The students wear their ... to school.", options: {a: "jacket", b: "jeans", c: "shorts", d: "uniform"}, ans: "d" },
        { q: "A: 'Do you like swimming?' <br> B: ' ... '.", options: {a: "Yes, I do", b: "No, I do", c: "Yes, I am", d: "Yes, I like"}, ans: "a" },
        { q: "Can I borrow the magazine? <br> I'm sorry, I'm .... it.", options: {a: "using", b: "reading", c: "playing", d: "singing"}, ans: "b" },
        { q: "The students will … some books in the library.", options: {a: "Keep", b: "Buy", c: "Give", d: "Borrow"}, ans: "d" },
        { q: "Arrange: You – am – thank – I – fine", options: {a: "Thank you I fine am", b: "I am fine thank you", c: "Fine thank you I am", d: "You thank I am fine"}, ans: "b" },
        { q: "A: Is the baby sleeping? <br> B: No, ….", options: {a: "He isn’t sleeping", b: "He is", c: "She isn’t", d: "She doesn’t"}, ans: "c" }
    ];

    let currentIdx = 0, userName = "", timeLeft = 20 * 60;
    let userAnswers = new Array(quizData.length).fill(null);
    let timerInterval;

    function startQuiz() {
        userName = document.getElementById('username').value.trim();
        if(!userName) return alert("Silakan isi nama terlebih dahulu!");
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        startTimer();
        initGrid();
        loadQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer-display').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timerInterval); alert("Waktu habis!"); showResult(); }
        }, 1000);
    }

    function initGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = "";
        quizData.forEach((_, i) => {
            const el = document.createElement('div');
            el.className = 'nav-num';
            el.id = `nav-${i}`;
            el.innerText = i + 1;
            el.onclick = () => { currentIdx = i; loadQuestion(); };
            grid.appendChild(el);
        });
    }

    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('progress').innerText = `SOAL NO. ${currentIdx + 1}`;
        
        const iBox = document.getElementById('image-box');
        if(data.image) {
            iBox.src = data.image;
            iBox.classList.remove('hidden');
        } else {
            iBox.classList.add('hidden');
        }

        const pBox = document.getElementById('passage-box');
        if(data.passage) { pBox.innerHTML = data.passage; pBox.classList.remove('hidden'); }
        else { pBox.classList.add('hidden'); }

        document.getElementById('question-box').innerHTML = data.q;

        const oBox = document.getElementById('options-box');
        oBox.innerHTML = "";
        for(let key in data.options) {
            const btn = document.createElement('button');
            btn.className = 'option' + (userAnswers[currentIdx] === key ? ' selected' : '');
            btn.innerHTML = `<strong>${key.toUpperCase()}.</strong> ${data.options[key]}`;
            btn.onclick = () => {
                userAnswers[currentIdx] = key;
                document.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                updateGridStyles();
            };
            oBox.appendChild(btn);
        }

        document.getElementById('prev-btn').style.visibility = (currentIdx === 0) ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = (currentIdx === quizData.length - 1) ? "Selesai" : "Lanjut";
        updateGridStyles();
    }

    function updateGridStyles() {
        quizData.forEach((_, i) => {
            const el = document.getElementById(`nav-${i}`);
            if(el) {
                el.classList.remove('current', 'answered');
                if(i === currentIdx) el.classList.add('current');
                if(userAnswers[i] !== null) el.classList.add('answered');
            }
        });
    }

    function nextQuestion() {
        if(currentIdx < quizData.length - 1) { currentIdx++; loadQuestion(); }
        else { if(confirm("Kumpulkan jawaban sekarang?")) { clearInterval(timerInterval); showResult(); } }
    }

    function prevQuestion() { if(currentIdx > 0) { currentIdx--; loadQuestion(); } }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        let correctCount = 0;
        userAnswers.forEach((ans, i) => { if(ans === quizData[i].ans) correctCount++; });
        let score = Math.round((correctCount / quizData.length) * 100);
        document.getElementById('final-score').innerText = score;

        if(DATABASE_URL) {
            document.getElementById('status-upload').innerText = "⏳ Mengirim nilai...";
            fetch(DATABASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: userName, score: score })
            }).then(() => {
                document.getElementById('status-upload').innerText = "✅ Berhasil Terkirim!";
                document.getElementById('status-upload').style.color = "var(--success)";
            }).catch(() => {
                document.getElementById('status-upload').innerText = "⚠️ Gagal mengirim.";
            });
        }
    }
</script>
</body>
</html>
